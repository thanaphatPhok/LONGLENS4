<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>จองคิวถ่ายภาพ</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background: #0f0f10; color: #eee; margin: 0; }
    .container { max-width: 900px; margin: auto; padding: 20px; }
    .card { background: #1c1c1f; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); margin-bottom: 20px; }

    .job-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
    .job-info { flex: 1; }
    .job-logo { width: 80px; }
    .job-image { width: 100%; max-width: 200px; border-radius: 10px; margin-top:10px; cursor:pointer; }

    .image-modal { position: fixed; inset:0; background: rgba(0,0,0,0); display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:.3s; }
    .image-modal.show { background: rgba(0,0,0,.9); opacity:1; pointer-events:auto; }
    .image-modal img { max-width:90%; max-height:90%; border-radius:10px; transform: scale(.8); transition:.3s; }
    .image-modal.show img { transform: scale(1); }

    input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; background: #6c63ff; color: white; cursor: pointer; }
    .danger { background: #dc3545; }

    .admin-btn { position: fixed; top:10px; right:10px; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#ff9800; }

    .status { padding: 5px 10px; border-radius: 8px; color: white; display: inline-block; margin-top: 10px; }
    .done { background: #28a745; }
    .pending { background: #dc3545; }

    .modal { position: fixed; inset:0; background: rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }
    .modal-box { background:#1c1c1f; padding:20px; border-radius:15px; width:300px; }

    .switch { text-align:center; margin-top:10px; cursor:pointer; color:#aaa; }
  </style>
</head>
<body>

<button id="adminBtn" class="admin-btn" onclick="openAdminModal()" style="display:none;">🔐</button>

<div class="container">
  <div style="text-align:center;"><img src="https://img2.pic.in.th/White-Illustrative-Photography-Logo.png" width="140"></div>
  <h1 style="text-align:center;">📸 ระบบจองคิวถ่ายภาพ</h1>

  <div class="card" id="loginBox">
    <h3 id="formTitle">เข้าสู่ระบบ</h3>

    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="อีเมล">
      <input type="password" id="loginPass" placeholder="รหัสผ่าน">
      <button onclick="login()">เข้าสู่ระบบ</button>
      <div class="switch" onclick="toggleForm(true)">สมัครสมาชิก</div>
    </div>

    <div id="registerForm" style="display:none;">
      <input id="regName" placeholder="ชื่อ">
      <input type="email" id="regEmail" placeholder="อีเมล">
      <input type="password" id="regPass" placeholder="รหัสผ่าน">
      <input type="password" id="regPass2" placeholder="ยืนยันรหัสผ่าน">
      <button onclick="register()">สมัครสมาชิก</button>
      <div class="switch" onclick="toggleForm(false)">มีบัญชีแล้ว? เข้าสู่ระบบ</div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="card">
      <input id="name" placeholder="ชื่อ - นามสกุล">
      <input id="type" placeholder="งานเกี่ยวกับอะไร">
      <input id="schedule" type="date">
      <textarea id="details" placeholder="รายละเอียด"></textarea>
      <input id="contact" placeholder="Line / เบอร์">
      <input id="image" type="file" accept="image/*">
      <img id="preview" style="display:none;max-width:200px;">
      <button onclick="submitForm()">ส่ง</button>
    </div>

    <div class="card"><div id="list"></div></div>
  </div>
</div>

<div class="image-modal" id="imageModal" onclick="this.classList.remove('show')">
  <img id="fullImage">
</div>

<div class="modal" id="adminModal" onclick="this.style.display='none'">
  <div class="modal-box" onclick="event.stopPropagation()">
    <input id="adminPinInput" type="password" placeholder="PIN">
    <button onclick="confirmAdmin()">ยืนยัน</button>
  </div>
</div>

<script>
let currentUser=null;
let adminMode=false;
let adminPin="163130";
let imageBase64="";

// register
function register(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;

  if(!name||!email||!pass||!pass2){
    alert('การสมัครสมาชิคไม่สำเร็จ: กรุณากรอกข้อมูลให้ครบ');
    return;
  }

  if(pass!==pass2){
    alert('การสมัครสมาชิคไม่สำเร็จ: รหัสผ่านไม่ตรงกัน');
    return;
  }

  let users=JSON.parse(localStorage.getItem('users')||'[]');
  users.push({name,email,pass});
  localStorage.setItem('users',JSON.stringify(users));
  alert('สมัครสำเร็จ');
  toggleForm(false);
}

// login
function login(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  let users=JSON.parse(localStorage.getItem('users')||'[]');

  const user=users.find(u=>u.email===email && u.pass===pass);
  if(!user) return alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง');

  currentUser=email;
  localStorage.setItem('user',email);
  document.getElementById('loginBox').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('adminBtn').style.display='flex';
  loadData();
}

function toggleForm(isRegister){
  document.getElementById('loginForm').style.display=isRegister?'none':'block';
  document.getElementById('registerForm').style.display=isRegister?'block':'none';
  document.getElementById('formTitle').innerText=isRegister?'สมัครสมาชิก':'เข้าสู่ระบบ';
}

// image preview
document.getElementById('image').onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{imageBase64=r.result;preview.src=r.result;preview.style.display='block';}
  r.readAsDataURL(f);
}

function submitForm(){
  let data=JSON.parse(localStorage.getItem('jobs')||'[]');
  if(data.find(j=>j.user===currentUser)) return alert('ส่งแล้ว');

  const job={
    user:currentUser,
    name: document.getElementById('name').value,
    type: document.getElementById('type').value,
    schedule: document.getElementById('schedule').value,
    details: document.getElementById('details').value,
    contact: document.getElementById('contact').value,
    image:imageBase64,
    status:'pending'
  };

  data.push(job);
  localStorage.setItem('jobs',JSON.stringify(data));
  loadData();
}

function loadData(){
  let data=JSON.parse(localStorage.getItem('jobs')||'[]');
  list.innerHTML='';

  data.forEach((job,i)=>{
    let div=document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <b>${job.name}</b><br>
      ${job.type}<br>
      ${job.schedule}<br>
      ${job.contact}<br>
      ${job.image?`<img src="${job.image}" class="job-image" onclick="openImage(this.src)">`:''}
      <div><span class="status ${job.status==='done'?'done':'pending'}">${job.status==='done'?'เสร็จแล้ว':'กำลังทำ'}</span></div>
    `;

    if(adminMode){
      let ok=document.createElement('button');
      ok.innerText='ยืนยัน';
      ok.onclick=()=>{data[i].status='done';localStorage.setItem('jobs',JSON.stringify(data));loadData();}

      let del=document.createElement('button');
      del.innerText='ลบ';
      del.className='danger';
      del.onclick=()=>{data.splice(i,1);localStorage.setItem('jobs',JSON.stringify(data));loadData();}

      div.appendChild(ok);
      div.appendChild(del);
    }

    list.appendChild(div);
  });
}

function openImage(src){fullImage.src=src;imageModal.classList.add('show');}

function openAdminModal(){adminModal.style.display='flex';}
function confirmAdmin(){if(adminPinInput.value!==adminPin)return alert('ผิด');adminMode=true;adminModal.style.display='none';loadData();}

window.onload=()=>{
  let saved=localStorage.getItem('user');
  if(saved){currentUser=saved;loginBox.style.display='none';app.style.display='block';adminBtn.style.display='flex';}
  loadData();
}
</script>

</body>
</html>
